<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Book Shop</title>
</head>
<body onload="onInit()">
    <main>
        <div class="search-container">
            <div>Book filtering</div>
            <input name="bookSearch" placeholder="Book's name" oninput="onTextFilter(event)">
            <button onclick="onClearFilterSearchbox()">clear</button>
        </div>
        <table>
            <thead>
                <tr>
                    <th>Title</th>
                    <th>Price</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody class="books-container">
            </tbody>
        </table>
        <button class="create" onclick="odAddBook()">Add new book</button>
    </main>
    <footer>
        <span>Copyright ©</span>
        <div class="stats-container">
            <span>Expensive: <span class="expensive"></span> |</span>
            <span>Average: <span class="average"></span> |</span>
            <span>Cheap: <span class="cheap"></span></span>
        </div>
    </footer>
    
    <div class="banner"></div>
    <dialog method="dialog" class="book-details"></dialog>

    <script src="js/services/utils.js"></script>
    <script src="js/services/storage.service.js"></script>
    <script src="js/services/bookShop.service.js"></script>
    <script src="js/bookShop.controller.js"></script>
</body>
</html>
