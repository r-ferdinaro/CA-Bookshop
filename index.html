<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Book Shop</title>
</head>
<body onload="onInit()">
    <main>
        <section class="search-container">
			<fieldset>
                <legend>Filter & Sorting</legend>
                <div class="filter-by">
                    <span>Title:</span>
                    <input class="title" name="bookSearch" placeholder="Book's title" oninput="onSetFilterBy(event)">
                    <span>Min rating:</span>
                    <select class="rating" name="ratingFilter" onchange="onSetFilterBy(event)">
                        <option value="1">★☆☆☆☆</option>
                        <option value="2">★★☆☆☆</option>
                        <option value="3">★★★☆☆</option>
                        <option value="4">★★★★☆</option>
                        <option value="5">★★★★★</option>
                    </select>
                </div>
                <button onclick="onClearFilterSearchbox()">clear</button>
            </fieldset> 
		</section>
        <table>
            <thead>
                <tr>
                    <th class="title">Title</th>
                    <th class="rating">Rating</th>
                    <th class="price">Price</th>
                    <th class="actions">Actions</th>
                </tr>
            </thead>
            <tbody class="books-container">
            </tbody>
        </table>
        <button class="create" onclick="odAddBook()">Add new book</button>
    </main>
    <footer>
        <span>Copyright ©</span>
        <div class="stats-container">
            <span>Expensive: <span class="expensive"></span> |</span>
            <span>Average: <span class="average"></span> |</span>
            <span>Cheap: <span class="cheap"></span></span>
        </div>
    </footer>
    
    <div class="banner"></div>
    <dialog method="dialog" class="book-details"></dialog>

    <script src="js/services/utils.js"></script>
    <script src="js/services/storage.service.js"></script>
    <script src="js/services/bookShop.service.js"></script>
    <script src="js/bookShop.controller.js"></script>
</body>
</html>
