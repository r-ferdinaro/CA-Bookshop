<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Book Shop</title>
</head>
<body onload="onInit()">
    <aside class="sidebar">
        <div class="logo">📖 Bookshop</div>
        <nav>
            <ul>
                <li class="active">Library</li>
            </ul>
        </nav>
        <div class="sidebar-footer">
            <button class="btn-create" onclick="odAddBook()">+ Add new book</button>
        </div>
    </aside>
    
    <div class="main-wrapper">
        <main class="main-content">
            <section class="content-header">
                <h1>Bookshop</h1>
	    		<fieldset>
                    <legend>Filter & Sorting</legend>
                    <div class="filter-by">
                        <input class="search-title" name="bookSearch" placeholder="Search by title" oninput="onSetFilterBy(event)">
                        <select class="rating" name="ratingFilter" onchange="onSetFilterBy(event)">
                            <option value="1">Min: ★☆☆☆☆</option>
                            <option value="2">Min: ★★☆☆☆</option>
                            <option value="3">Min: ★★★☆☆</option>
                            <option value="4">Min: ★★★★☆</option>
                            <option value="5">Min: ★★★★★</option>
                        </select>
                        <button onclick="onClearFilterSearchbox()">clear</button>
                    </div>
                    <div class="sort-by">
                        <select class="sort" name="ratingSort" onchange="onSetSortBy(event)">
                            <option value="title">Sort: Title</option>
                            <option value="price">Sort: Price</option>
                            <option value="rating">Sort: Rating</option>
                        </select>
                        <span>Descending:</span>
                        <label class="toggle-switch">
                            <input class="desc" type="checkbox" name="descending" onchange="onSetSortBy(event)">
                            <span class="slider"></span>
                        </label>
                    </div>
                </fieldset> 
	    	</section>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th class="cover">Cover</th>
                            <th class="title">Title</th>
                            <th class="rating">Rating</th>
                            <th class="price">Price</th>
                            <th class="actions">Actions</th>
                        </tr>
                    </thead>
                    <tbody class="books-container"></tbody>
                </table>
            </div>

            <section class="pagination">
                <div class="page-info">Showing page <span class="current"></span></div>
                <div class="page-controls">
                    <button onclick="onPageChange(false)">←</button>
                    <button onclick="onPageChange(true)">→</button>
                </div>
            </section>

        </main>
        <footer>
            <span>Copyright © bookshop</span>
            <div class="stats-container">
                <span>Expensive: <span class="expensive"></span> |</span>
                <span>Average: <span class="average"></span> |</span>
                <span>Cheap: <span class="cheap"></span></span>
            </div>
        </footer>
    </div>
    
    <div class="banner"></div>
    
    <dialog method="dialog" class="book-details"></dialog>

    <script src="js/services/utils.js"></script>
    <script src="js/services/storage.service.js"></script>
    <script src="js/services/bookShop.service.js"></script>
    <script src="js/bookShop.controller.js"></script>
</body>
</html>
